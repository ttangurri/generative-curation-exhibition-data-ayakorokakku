<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing with the Chaos: Seoul Awakening</title>
    <style>
        :root {
            --bg-color: #d8c4a9; /* 골판지 베이스 색상 */
            --system-color: rgba(30, 30, 30, 0.4);
            --accent-pink: #ff007f;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            cursor: crosshair;
            user-select: none;
        }

        /* 전시용 전체 레이아웃 */
        #exhibition-stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 골판지 질감 필터 */
        #texture-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0.15;
            background-image: url('https://www.transparenttextures.com/patterns/cardboard.png');
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        /* UI 레이어: 전시 정보 및 시스템 로그 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block {
            border-left: 4px solid var(--accent-pink);
            padding-left: 15px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: #222;
        }

        .title-block p {
            margin: 5px 0 0;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .system-logs {
            text-align: right;
            font-size: 11px;
            line-height: 1.5;
            color: var(--system-color);
        }

        .footer {
            display: flex;
            justify-content: center;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            color: #444;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #energy-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-pink);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* 글리치 텍스트 효과 */
        .glitch {
            position: relative;
        }
    </style>
</head>
<body>

<div id="exhibition-stage">
    <div id="texture-overlay"></div>
    <!-- Layer 1: Meta Seoul (System Grid) -->
    <canvas id="gridCanvas"></canvas>
    <!-- Layer 2: Rokkaku Energy (Organic Painting) -->
    <canvas id="paintCanvas"></canvas>
    
    <div id="ui-overlay">
        <div class="header">
            <div class="title-block">
                <h1>BREATHING WITH THE CHAOS</h1>
                <p>Digital Awakening: Meta-Seoul 셧다운 시뮬레이션</p>
            </div>
            <div class="system-logs" id="log-container">
                <div>[SERVER_STABILIZER_ACTIVE]</div>
                <div>[DATA_INTEGRITY: 94.2%]</div>
                <div id="glitch-log">-- NO ERRORS DETECTED --</div>
            </div>
        </div>

        <div class="footer">
            <div class="status-bar">
                <span id="energy-pulse"></span>
                <span id="instruction">화면을 손가락(마우스)으로 문질러 시스템을 정화하세요.</span>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * BREATHING WITH THE CHAOS: INTERACTIVE WEB ART
     * --------------------------------------------
     * Concept: Ayako Rokkaku's organic touch vs. Meta Seoul's digital grid.
     * Ratio: System 40% : Art 60%
     */

    const gridCanvas = document.getElementById('gridCanvas');
    const paintCanvas = document.getElementById('paintCanvas');
    const gctx = gridCanvas.getContext('2d');
    const pctx = paintCanvas.getContext('2d');
    const logContainer = document.getElementById('glitch-log');

    let width, height;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let paintEnergy = 0;

    // 록카쿠의 시그니처 컬러 팔레트
    const colors = [
        '#ff007f', // Vivid Pink
        '#ffeb3b', // Bright Yellow
        '#00bcd4', // Sky Blue
        '#8bc34a', // Grass Green
        '#ff9800', // Orange
        '#ffffff', // Pure Light
        '#673ab7'  // Deep Purple
    ];

    function init() {
        resize();
        animate();
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        gridCanvas.width = paintCanvas.width = width;
        gridCanvas.height = paintCanvas.height = height;
        
        // 리사이즈 시 그리드 재설정
        drawStaticGrid();
    }

    // 40%의 비중을 차지하는 디지털 그리드 (메타 서울)
    function drawStaticGrid() {
        gctx.clearRect(0, 0, width, height);
        gctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
        gctx.lineWidth = 1;

        const gap = 50;
        for (let x = 0; x <= width; x += gap) {
            gctx.beginPath();
            gctx.moveTo(x, 0);
            gctx.lineTo(x, height);
            gctx.stroke();
        }
        for (let y = 0; y <= height; y += gap) {
            gctx.beginPath();
            gctx.moveTo(0, y);
            gctx.lineTo(width, y);
            gctx.stroke();
        }
    }

    // 시스템의 저항: 무작위 글리치 및 그리드 복구
    function updateSystem() {
        if (Math.random() > 0.97) {
            const h = Math.random() * 20;
            gctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            gctx.fillRect(0, Math.random() * height, width, h);
            
            // 시스템 로그 업데이트
            const codes = ['ERR_GRID_BREACH', 'RECOVERING_SECTOR_7', 'UNAUTHORIZED_TOUCH', 'CHAOS_DETECTED'];
            logContainer.innerText = `[${codes[Math.floor(Math.random() * codes.length)]}]`;
            logContainer.style.color = '#ff4444';
            setTimeout(() => {
                logContainer.innerText = '-- MONITORING --';
                logContainer.style.color = 'rgba(30, 30, 30, 0.4)';
            }, 500);
        }
    }

    // 60%의 비중을 차지하는 록카쿠의 유기적 터치
    function drawRokkaku(x, y) {
        const dx = x - lastX;
        const dy = y - lastY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const speed = Math.min(distance, 100);
        
        // 록카쿠의 리듬감: 속도에 따른 불규칙한 원형 겹치기
        const count = Math.floor(speed / 5) + 3;
        const baseRadius = Math.max(5, speed * 0.8);

        pctx.globalCompositeOperation = 'source-over';

        for (let i = 0; i < count; i++) {
            const offsetX = (Math.random() - 0.5) * speed * 1.5;
            const offsetY = (Math.random() - 0.5) * speed * 1.5;
            const r = Math.random() * baseRadius + 2;
            const color = colors[Math.floor(Math.random() * colors.length)];

            pctx.beginPath();
            pctx.arc(x + offsetX, y + offsetY, r, 0, Math.PI * 2);
            pctx.fillStyle = color;
            pctx.globalAlpha = Math.random() * 0.4 + 0.1;
            pctx.fill();

            // 물감이 튀는 듯한 작은 입자들 (Spatter)
            if (speed > 30) {
                pctx.beginPath();
                pctx.arc(x + offsetX * 2, y + offsetY * 2, Math.random() * 3, 0, Math.PI * 2);
                pctx.fill();
            }
        }

        // 특정 확률로 "아이의 시선" (커다란 눈) 생성
        if (speed > 40 && Math.random() > 0.985) {
            createEye(x, y);
        }

        lastX = x;
        lastY = y;
    }

    function createEye(x, y) {
        pctx.save();
        pctx.globalAlpha = 0.9;
        pctx.translate(x, y);
        pctx.rotate((Math.random() - 0.5) * 0.5);

        // 눈의 흰자
        pctx.fillStyle = 'white';
        pctx.beginPath();
        pctx.ellipse(0, 0, 35, 22, 0, 0, Math.PI * 2);
        pctx.fill();

        // 눈동자
        pctx.fillStyle = '#1a1a1a';
        pctx.beginPath();
        pctx.arc(0, 0, 12, 0, Math.PI * 2);
        pctx.fill();

        // 하이라이트
        pctx.fillStyle = 'white';
        pctx.beginPath();
        pctx.arc(-4, -4, 4, 0, Math.PI * 2);
        pctx.fill();

        pctx.restore();
    }

    // 애니메이션 루프
    function animate() {
        updateSystem();
        requestAnimationFrame(animate);
    }

    // 이벤트 리스너
    window.addEventListener('mousedown', (e) => {
        isDrawing = true;
        [lastX, lastY] = [e.clientX, e.clientY];
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        drawRokkaku(e.clientX, e.clientY);
    });

    window.addEventListener('mouseup', () => isDrawing = false);

    // 터치 기기 지원
    window.addEventListener('touchstart', (e) => {
        isDrawing = true;
        const touch = e.touches[0];
        [lastX, lastY] = [touch.clientX, touch.clientY];
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const touch = e.touches[0];
        drawRokkaku(touch.clientX, touch.clientY);
    });

    window.addEventListener('touchend', () => isDrawing = false);

    window.addEventListener('resize', resize);

    // 초기화 시작
    window.onload = init;

</script>
</body>
</html>
